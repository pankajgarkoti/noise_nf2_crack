syntax = "proto2";

import "nanopb.proto";

option java_package = "com.zh.ble.wear.protobuf";
option java_outer_classname = "SystemTimeProtos";

message SESystemTime {
  oneof payload {
    SETimeSet time_set = 1;
    SEWorldClockInfo world_clock_info = 2;
    SEWorldClockInfo.SEList world_clock_info_list = 3;
  }
}

message SETimeSet {
  optional uint32 timestamp = 1;
  optional sint32 offset = 2;
  optional bool time_format = 3;
}

message SEWorldClockInfo {
  message SEList {
    repeated SEWorldClockInfo list = 1;
  }
  required string city_name = 1;
  required double longitude = 2;
  required double latitude = 3;
  required sint32 offset = 4;
  optional uint32 city_id = 5;
}
