syntax = "proto2";

import "nanopb.proto";

option java_package = "com.zh.ble.wear.protobuf";
option java_outer_classname = "DeviceProtos";

message SEDevice {
  oneof payload {
    SEDeviceInfo device_info = 1;
    SEDeviceBatteryStatus device_battery_status = 2;
    SEMptPowerLog mpt_power_log = 3;
    SEMptPowerLog.List mpt_power_log_list = 4;
    SEDeviceBatteryValue device_battery_value_request = 5;
    SEDeviceChargingCaseStatus device_charging_case_status = 6;
  }
}

message SEDeviceInfo {
  required string firmware_version = 1;
  required string equipment_number = 2;
  required string mac = 3;
  required string serial_number = 4;
  required SEDeviceBatteryStatus device_battery_status = 5;
  optional bool remote_device_remote_camera_switch = 6;
  optional bool sports_icon_function_protocol_switch = 7;
  optional uint32 last_disconnect_reason = 8;
  optional uint32 last_disconnect_timestamp = 9;
  optional bool spp_support_flat = 10;
}

message SEDeviceBatteryValue {
  required uint32 device_battery_value = 1;
}

message SEDeviceChargingCaseStatus {
  required uint32 batt_level = 1;
  required uint32 lid_status = 2;
  required string serial_nums = 3;
  optional string version = 4;
  optional uint32 charge_status = 5;
}

message SEDeviceBatteryStatus {
  enum SEChargeStatus {
    UNKNOWN = 0;
    CHARGING = 1;
    NOT_CHARGING = 2;
    FULL = 3;
  }
  required uint32 capacity = 1;
  optional SEDeviceBatteryStatus.SEChargeStatus charge_status = 2;
}

message SEPowerLog {
  message List {
    repeated SEPowerLog list = 1;
  }
  required uint32 id = 1;
  required uint32 quantity = 2;
  required uint32 percent = 3;
}

message SEMptPowerLog {
  message List {
    repeated SEMptPowerLog list = 1;
  }
  required uint32 timestamp = 1;
  required uint32 power_percent = 2;
  required SEPowerLog.List power_log_list = 3;
  optional uint32 end_timestamp = 4;
}
