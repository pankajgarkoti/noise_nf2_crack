enum SEGpsAccuracy {
  GPS_LOW = 0;
  GPS_MEDIUM = 1;
  GPS_HIGH = 2;
  GPS_UNKNOWN = 10;
}

message SESporting {
  oneof payload {
    SESportStatus sport_status = 1;
    SESportRequest sport_request = 2;
    SESportResponse sport_response = 3;
    SEPhoneSportData phone_sport_data = 4;
    SEWearSportData wear_sport_data = 5;
    SEEcgData ecg_data = 6;
    SEEcgCalibrationData ecg_calibration_data = 7;
    SEAppMessageType App_message_type = 8;
    SEAutoSportData.SEList auto_sport_data_list = 9;
    SERingSportStatusData ring_Sport_Param_Data = 10;
  }
}

message SESportStatus {
  required uint32 sport_type = 1;
  optional uint32 timestamp = 2;
  optional uint32 duration = 3;
  optional bool paused = 4;
  optional bool standalone = 5;
  optional uint32 select_version = 6;
  optional bool app_launched = 7;
}

message SESportRequest {
  enum SEState {
    GPS_START_REQUEST = 0;
    START = 1;
    PAUSE = 2;
    RESUME = 3;
    STOP = 4;
  }
  enum SECode {
    NORMAL_END = 0;
    SPORT_DURATION_NO_METTING = 1;
    DEVICE_STORAGE_SPACE_FULL = 2;
    UNKNOWN = 10;
  }
  required uint32 timestamp = 1;
  required uint32 sport_type = 2;
  required SESportRequest.SEState state = 3;
  optional uint32 support_versions = 4;
  optional SESportRequest.SECode error_code = 5;
}

message SESportResponse {
  enum SECode {
    OK = 0;
    BUSY = 1;
    TYPE_NOT_MATCH = 2;
    NO_PERMISSION = 3;
    NOT_SUPPORT = 4;
    LACK_OF_ACCURACY = 5;
    CHARGING = 6;
    LOW_BATTERY = 7;
    SEEK_FAIL = 8;
    SPACE_WILL_BE_FULL = 9;
    SPACE_IS_FULL = 11;
    DEVICE_IS_SPORTING = 12;
    NORMAL_END = 13;
    SPORT_DURATION_NO_METTING = 14;
    DEVICE_STORAGE_SPACE_FULL = 15;
    UNKNOWN = 10;
  }
  required SESportResponse.SECode code = 1;
  optional SESportStatus sport_status = 2;
  optional SEGpsAccuracy gps_accuracy = 3;
  optional uint32 select_version = 4;
}

message SEPhoneSportData {
  required SEGpsAccuracy gps_accuracy = 1;
  required uint32 timestamp = 2;
  required double longitude = 3;
  required double latitude = 4;
  optional double altitude = 5;
  optional float speed = 6;
  optional float bearing = 7;
  optional float horizontal_accuracy = 8;
  optional float vertical_accuracy = 9;
  optional uint32 gps_Coordinate_system_type = 10;
}

message SEWearSportData {
  enum SESportLevel {
    INACTIVE = 0;
    LOW = 1;
    MEDIUM = 2;
    HIGH = 3;
  }
  required uint32 heart_rate = 1;
  required uint32 calories = 2;
  optional uint32 steps = 3;
  optional uint32 distance = 4;
  optional uint32 sport_timestamp = 5;
  optional SEWearSportData.SESportLevel sport_level = 6;
}

message SEEcgCalibrationData {
  required bool ecg_calibration_state = 1;
  optional uint32 ecg_calibration_mode = 2;
  optional uint32 ecg_level_calibration = 3;
  optional uint32 ecg_calibration_heart = 4;
  optional uint32 ecg_calibration_systolic = 5;
  optional uint32 ecg_calibration_diastolic = 6;
}

message SEEcgReportData {
  optional uint32 ecg_heart = 1;
  optional uint32 ecg_systolic = 2;
  optional uint32 ecg_diastolic = 3;
  optional uint32 ecg_hrvResult = 4;
  optional uint32 ecg_healthIndex = 5;
  optional uint32 ecg_fatigueIndex = 6;
  optional uint32 ecg_bodyLoad = 7;
  optional uint32 ecg_bodyQuality = 8;
  optional uint32 ecg_cardiacFunction = 9;
}

message SEEcgData {
  enum SEECGCommand {
    ECG_REQUEST_MEASUREMENT = 0;
    ECG_START_MEASUREMENT = 1;
    ECG_ABNORMAL_END_MEASUREMENT = 2;
    ECG_END_MEASUREMENT = 3;
    ECG_MANUAL_END_MEASUREMENT = 4;
  }
  enum SEECGRespond {
    OK = 0;
    BUSY = 1;
    CHARGING = 2;
    LOW_BATTERY = 3;
    END_MEASUREMENT_DATA_OK = 4;
    END_MEASUREMENT_DATA_ERROR = 5;
    UNKNOWN = 10;
  }
  optional SEEcgData.SEECGCommand ecg_command = 1;
  optional SEEcgData.SEECGRespond ecg_respond = 2;
  optional SEEcgData.SEECGRespond ecg_end_result = 3;
  optional uint32 ecg_data_index = 4;
  optional bytes ecg_data = 5;
  optional SEEcgCalibrationData ecg_calibration_data = 6;
  optional uint32 ecg_mode = 7;
  optional SEEcgReportData ecg_report_data = 8;
}

message SEAppMessageType {
  required uint32 measure_type = 1;
  optional bool switch_measure = 2;
  optional bool wrist_status = 3;
  optional uint32 measure_value = 4;
  optional uint32 measure_time = 5;
  optional uint32 error_reason = 6;
}

message SEAutoSportData {
  message SEList {
    repeated SEAutoSportData list = 1;
  }
  optional uint32 autosport_type = 1;
  optional uint32 autosport_starttime = 2;
  optional uint32 autosport_duration = 3;
  optional uint32 autosport_steps = 4;
  optional uint32 autosport_intensity = 5;
  optional uint32 autosport_kcal = 6;
  optional bytes hr_data = 7;
}

message SERingSportStatusData {
  enum SESportstatus {
    SPORT_STATUS_NONE = 0;
    SPORT_STATUS_START = 1;
    SPORT_STATUS_PAUSE = 2;
    SPORT_STATUS_RESUME = 3;
    SPORT_STATUS_END = 4;
  }
  enum SESportEndstatus {
    SPORT_ENDSTATUS_NONE = 0;
    SPORT_ENDSTATUS_LOW_POWER = 1;
    SPORT_ENDSTATUS_TIMEOUT = 2;
    SPORT_ENDSTATUS_MEMOVER = 3;
    SPORT_ENDSTATUS_CHARGE = 4;
  }
  enum SESportStartstatus {
    SPORT_STARTSTATUS_NONE = 0;
    SPORT_STARTSTATUS_LOW_POWER = 1;
    SPORT_STARTSTATUS_UNWEAR = 2;
    SPORT_STARTSTATUS_CHARING = 3;
    SPORT_STARTSTATUS_SPORTING = 4;
  }
  optional bool is_sport_no_sync = 1;
  optional bool is_sport_ing = 2;
  optional SERingSportStatusData.SESportEndstatus sport_end_status = 3;
  optional SERingSportStatusData.SESportstatus sport_status = 4;
  optional SERingSportStatusData.SESportStartstatus sport_start_status = 5;
  optional uint32 startsport_type = 6;
  optional uint32 startsport_curtime = 7;
  optional uint32 startsport_duration = 8;
}
