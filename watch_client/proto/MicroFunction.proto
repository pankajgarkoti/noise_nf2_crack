enum SEOrder {
  HEAD_RESIDENT = 0;
  HIGHEST = 10;
  LOWEST = 241;
  RESIDENT = 242;
}

enum SEIncalidSleepReason {
  SEINCALIDSLEEPREASON_ELEVATE_HEART_RATE = 1;
  SEINCALIDSLEEPREASON_ACTIVITY_AWAKE = 2;
  SEINCALIDSLEEPREASON_ONE_AND_TWO = 3;
  SEINCALIDSLEEPREASON_SLEEP_DURATION_SHORT = 4;
  SEINCALIDSLEEPREASON_ONE_FOUR = 5;
  SEINCALIDSLEEPREASON_TWO_FOUR = 6;
  SEINCALIDSLEEPREASON_ONE_TWO_FOUR = 7;
}

message SEMicroFunction {
  oneof payload {
    SEFindPhoneMode find_phone_mode = 1;
    SEPhotographMode photograph_mode = 2;
    SEBasicDataMode basic_data_mode = 3;
    SEBasicData basic_data = 4;
    SEWidget.SEList widget_list = 5;
    SEWidget.SEList application_list = 6;
    SEWidget.SEList quick_widget_list = 7;
    SEWidget.SEList sport_icon_list = 8;
    SEWidget.SEList sport_other_list = 9;
    SEWidget.SEList sport_icon_infowear_list = 10;
    uint32 nfc_sleep_err = 11;
    uint32 inquiry_wearing_status = 12;
    uint32 request_wearing_result = 13;
    SESleepStatus sleep_status = 14;
    SESarCalibration sar_calibration = 15;
  }
}

message SEBasicData {
  required uint32 steps = 1;
  required uint32 calories = 2;
  optional uint32 distance = 3;
  optional uint32 heart_rate = 4;
  optional uint32 blood_oxygen = 5;
  optional uint32 effective_standing = 6;
  optional SEDeviceBatteryStatus device_battery_status = 7;
  optional uint32 effective_standing_hour = 8;
  optional uint32 sleep_duration = 9;
  optional SEPhysiologicalCycle physiological_cycle = 10;
  optional uint32 HBA_data = 11;
  optional uint32 activity_duration = 12;
  optional uint32 pressure = 13;
  optional uint32 today_oura_calorie_data = 14;
  optional uint32 today_sport_calorie_data = 15;
  optional bytes steps_data = 16;
  optional bytes distance_data = 17;
  optional bytes calorie_data = 18;
  optional bytes today_oura_calorie_hourly_data = 19;
  optional bytes today_sport_calorie_hourly_data = 20;
  optional SEDeviceChargingCaseStatus device_charging_case_status = 21;
  optional bytes sar_gdiff = 22;
  optional uint32 nfc_sleep_err = 23;
  optional uint32 fully_charged_need_time = 24;
  optional uint32 remaining_battery_time = 25;
}

message SEWidget {
  message SEList {
    repeated SEWidget list = 1;
  }
  required uint32 function = 1;
  required bool enable = 2;
  optional uint32 order = 3;
  optional bool have_hide = 4;
  optional bool sortable = 5;
}

message SESleepStatus {
  required uint32 invalid_sleep_reason = 1;
}

message SESarCalibration {
  required uint32 sar_daiff = 1;
  required uint32 sar_offset = 2;
  required uint32 sar_basedata = 3;
}
